name: Build and Test

# Excludes the Playwright smoke suite (sibling project under e2e/). Those run separately.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Check formatting (scalafmt)
        run: sbt scalafmtCheckAll #scalafmtSbtCheck

      - name: Check lint (scalafix)
        run: sbt 'scalafixAll --check'

      - name: Run unit tests
        run: sbt test

      - name: Build for production
        run: npm run build
