AutoName: Tessella

Description: |-
    Tessella is an editor for polygon tessellations of the plane: interactively
    create, view and manipulate tilings made of simple (regular and irregular)
    polygons.

    Features:

    * Add polygons from a palette, or by clicking any boundary edge, with
      automatic validation that keeps a proper edge-to-edge finite tessellation.
    * Editing tools: eraser (vertices, edges, polygons), interior insertion,
      and "Add Copy" to grow a tiling by welding on a copy of itself under a
      plane isometry (translate, rotate, reflect, glide reflect), snapping to
      exact anchors.
    * Selection and styling: select by click, colour or shape; recolour with a
      built-in colour picker.
    * Pan, zoom and rotate the canvas; export to SVG and DOT.

    The app is a thin WebView wrapper around the same client-side editor that is
    published on the web and as a PWA. Everything runs on-device: no network
    access, no accounts, no trackers.

RepoType: git
Repo: https://github.com/tessell-art/editor.git

Builds:
  # NOTE: commit/versionName/versionCode below must point at the FIRST released
  # tag that contains the android/ module. v0.5.0 predates it, so this targets
  # the next release (bump package.json to 0.6.0, merge android/ to main, tag
  # v0.6.0). versionCode 600 = 0*10000 + 6*100 + 0 (see android/app/build.gradle).
  - versionName: 0.6.0
    versionCode: 600
    commit: v0.6.0
    subdir: android
    sudo:
      # The build server provides JDK, Gradle and the Android SDK, but not the
      # two upstream toolchains this app needs:
      #   * Node.js -> runs Vite to bundle the static web assets (dist/)
      #   * sbt     -> drives the Scala.js linker (invoked by the Vite plugin)
      # Installed as root; sudo state is reset after each build.
      - apt-get update
      - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      - apt-get install -y nodejs
      - echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" > /etc/apt/sources.list.d/sbt.list
      - curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | gpg --dearmor -o /usr/share/keyrings/sbt.gpg
      - apt-get update
      - apt-get install -y sbt
    prebuild:
      # Runs in subdir (android/). Build the web bundle from the repo root:
      # `npm run build` invokes sbt fullLinkJS via the Vite plugin, then Vite
      # emits dist/. Gradle's copyWebDist task then stages dist/ into assets.
      - cd .. && npm ci && npm run build
    gradle:
      - yes

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags ^v[0-9.]+$
CurrentVersion: 0.6.0
CurrentVersionCode: 600
