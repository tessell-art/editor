Builds:
  - versionName: 0.6.1
    versionCode: 601
    commit: 9b0c88d991d90d30526d813b676d2410454de500
    subdir: android
    sudo:
      - apt-get update
      - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      - apt-get install -y nodejs
      - echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" > /etc/apt/sources.list.d/sbt.list
      - curl -fsSL 
        "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823"
        | gpg --dearmor -o /etc/apt/trusted.gpg.d/sbt.gpg
      - apt-get update
      - apt-get install -y sbt
    gradle:
      - yes
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    prebuild: cd .. && npm ci && npm run build
    scandelete:
      - node_modules
      - target
      - project/target
      - project/project/target

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9.]+$
CurrentVersion: 0.6.1
CurrentVersionCode: 601
